upstream python_backend  { server python-app:8001; }
upstream node_backend    { server node-app:8002; }
upstream java_backend    { server java-app:8003; }
upstream php_backend     { server php-app:8004; }

server {
    listen 80;
    server_name localhost;

    # Landing page lists all backends
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html><head><title>Bits &amp; Bytes Pet Shop - Gateway</title>
<style>
body{font-family:system-ui,sans-serif;background:#F5F0FF;margin:0;padding:2rem;color:#1F2937}
h1{color:#632CA6}a{color:#632CA6;text-decoration:none;font-weight:600}
a:hover{text-decoration:underline}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;margin-top:2rem}
.card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(99,44,166,.12);border:1px solid #E9E0F5}
.card h2{font-size:1.1rem;margin-bottom:.5rem}.card p{color:#6B7280;font-size:.9rem}
.tag{display:inline-block;background:#632CA6;color:#fff;padding:2px 8px;border-radius:4px;font-size:.75rem;margin-top:.5rem}
</style></head><body>
<h1>Bits &amp; Bytes Pet Shop</h1>
<p>Security Sandbox Suite gateway. Pick a tracer backend:</p>
<div class="grid">
<div class="card"><h2><a href="/py/">Python (Flask)</a></h2><p>dd-trace-py</p><span class="tag">:8001</span></div>
<div class="card"><h2><a href="/node/">Node (Express)</a></h2><p>dd-trace-js</p><span class="tag">:8002</span></div>
<div class="card"><h2><a href="/java/">Java (Spring)</a></h2><p>dd-java-agent</p><span class="tag">:8003</span></div>
<div class="card"><h2><a href="/php/">PHP (Slim)</a></h2><p>dd-trace-php</p><span class="tag">:8004</span></div>
</div></body></html>';
    }

    location /py/ {
        proxy_pass http://python_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /py;
    }

    location /node/ {
        proxy_pass http://node_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /node;
    }

    location /java/ {
        proxy_pass http://java_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /java;
    }

    location /php/ {
        proxy_pass http://php_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /php;
    }
}
